<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connecting...</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(130% 100% at 50% 30%, #1c2026 0%, #131519 60%, #0d0f12 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px;
      font-family: var(--font-ui);
      color: #fff;
    }
    .connect-logo {
      height: 46px;
      width: auto;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5));
      /* logo sits on dark — lift it onto a soft chip for legibility */
      background: #fff;
      padding: 12px 18px;
      border-radius: var(--r);
      box-shadow: var(--shadow-lg);
    }
    .spinner-wrap { position: relative; width: 56px; height: 56px; }
    .spinner {
      width: 56px; height: 56px;
      border: 4px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .connect-title {
      font-family: var(--font-display);
      font-stretch: 110%;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.005em;
    }
    .connect-sub {
      color: #9aa0a8;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation-duration: 1.6s; }
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="JL Customs" class="connect-logo">
  <div class="spinner-wrap"><div class="spinner"></div></div>
  <div style="text-align:center; display:flex; flex-direction:column; gap:6px;">
    <div class="connect-title">Connecting you with an expert</div>
    <div class="connect-sub">Hang tight — this only takes a moment.</div>
  </div>
  <script>
    window.location.replace('https://meet.jit.si/jlcustoms-expert-kiosk#config.prejoinPageEnabled=false&userInfo.displayName=Customer');
  </script>
</body>
</html>
