<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JL Customs - Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      color: #111;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 32px;
      background: #fff;
      border-bottom: 2px solid #c0392b;
    }

    .header-logo {
      height: 25px;
      width: auto;
    }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 74px);
      gap: 20px;
    }

    .tagline {
      font-size: 1.1rem;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .estimate-btn {
      padding: 44px 100px;
      font-size: 2.6rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #111;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .estimate-btn:hover { background: #f0f0f0; border-color: #c0392b; }
    .estimate-btn:active { transform: scale(0.97); }

    /* ── Contact button (bottom-left) ── */
    .contact-btn {
      position: fixed;
      bottom: 28px;
      left: 28px;
      padding: 12px 22px;
      font-size: 0.95rem;
      font-weight: bold;
      color: #111;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      letter-spacing: 0.03em;
    }

    .contact-btn:hover { background: #f0f0f0; border-color: #c0392b; }
    .contact-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div style="position:fixed;top:12px;right:12px;width:18px;height:18px;background:#c0392b;border-radius:3px;z-index:9999;pointer-events:none;"></div>

  <header>
    <img src="logo.png" alt="JL Customs" class="header-logo">
  </header>

  <main>
    <!-- <p class="tagline">Custom Commercial Vehicles</p> -->
    <button class="estimate-btn" onclick="window.location.href='vehicle-select.html'">Get an Estimate</button>
  </main>

  <button class="contact-btn" onclick="window.location.href='contact.html'">Contact an Expert</button>

  <script>
    const TIMEOUT_MS = 60 * 1000;
    let inactivityTimer;

    function goBack() {
      window.location.href = 'index.html';
    }

    function resetTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(goBack, TIMEOUT_MS);
    }

    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'].forEach((ev) => {
      document.addEventListener(ev, resetTimer, { passive: true });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' || e.key === 'Backspace') goBack();
    });

    resetTimer();
  </script>
</body>
</html>
