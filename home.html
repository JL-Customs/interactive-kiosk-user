<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JL Customs - Home</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="keyboard.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(150% 80% at 50% -10%, #ffffff 0%, rgba(255,255,255,0) 55%),
        linear-gradient(180deg, var(--paper) 0%, #eceae3 100%);
      color: var(--ink);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 32px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 0 var(--brand), var(--shadow-sm);
    }

    .header-logo {
      height: 34px;
      width: auto;
    }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 76px);
      gap: 22px;
    }

    .tagline {
      font-family: var(--font-ui);
      font-size: 0.82rem;
      color: var(--steel-soft);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }

    /* ── Choice buttons ── */
    .estimate-btn, .contact-btn {
      position: relative;
      width: 620px;
      max-width: calc(100vw - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 42px 80px;
      font-family: var(--font-display);
      font-stretch: 112%;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.005em;
      border-radius: var(--r-lg);
      cursor: pointer;
      user-select: none;
      transition: transform 0.14s var(--ease), box-shadow 0.22s var(--ease),
                  background 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s;
    }

    .estimate-btn::after, .contact-btn::after {
      content: '\2192';
      position: absolute;
      right: 38px;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--brand);
      opacity: 0.55;
      transition: transform 0.22s var(--ease), opacity 0.2s;
    }
    .estimate-btn:hover::after, .contact-btn:hover::after { transform: translateX(7px); opacity: 1; }

    /* Primary: graphite slab, the main path */
    .estimate-btn {
      color: #fff;
      background: linear-gradient(180deg, #24282e 0%, var(--graphite) 100%);
      border: 1px solid #0d0e11;
      box-shadow: var(--shadow-md);
    }
    .estimate-btn::after { opacity: 0.95; }
    .estimate-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .estimate-btn:active { transform: translateY(0) scale(0.985); box-shadow: var(--shadow); }

    /* Secondary: clean card */
    .contact-btn {
      color: var(--ink);
      background: var(--surface);
      border: 1.5px solid var(--line-strong);
      box-shadow: var(--shadow-sm);
    }
    .contact-btn:hover { transform: translateY(-2px); border-color: var(--brand); color: var(--brand); box-shadow: var(--shadow); }
    .contact-btn:active { transform: translateY(0) scale(0.985); }


    /* ── Contact Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14, 16, 20, 0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      width: min(480px, 90vw);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .modal-overlay.open .modal { animation: modal-pop 0.28s var(--ease) both; }
    @keyframes modal-pop {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .modal-header {
      padding: 18px 24px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
      box-shadow: inset 0 -2px 0 var(--brand);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 {
      font-family: var(--font-display);
      font-stretch: 110%;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.005em;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--steel-soft);
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      width: 36px;
      height: 36px;
      border-radius: var(--r-sm);
      transition: background 0.18s, color 0.18s;
    }
    .modal-close:hover { color: var(--ink); background: rgba(0,0,0,0.05); }

    .modal-body { padding: 28px 24px; }

    .contact-intro {
      color: var(--steel);
      font-size: 1rem;
      margin-bottom: 22px;
      line-height: 1.55;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      font-size: 1.1rem;
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-icon {
      font-size: 1.2rem;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--brand-tint);
      color: var(--brand);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .contact-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      color: var(--steel-soft);
      margin-bottom: 3px;
    }
    .contact-value { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 12px;
    }

    .btn-secondary {
      flex: 1;
      padding: 13px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 700;
      background: var(--surface);
      border: 1.5px solid var(--line-strong);
      color: var(--steel);
      border-radius: var(--r-sm);
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); background: var(--surface-2); }

    .btn-primary {
      flex: 1;
      padding: 13px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(180deg, var(--brand) 0%, var(--brand-strong) 100%);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      text-align: center;
      box-shadow: var(--shadow-brand);
      transition: filter 0.2s, transform 0.12s, box-shadow 0.2s;
    }
    .btn-primary:hover { filter: brightness(1.06); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--line-strong); color: #fff; cursor: not-allowed; box-shadow: none; filter: none; }

    .btn-back {
      padding: 13px 24px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      background: none;
      border: 1.5px solid var(--line-strong);
      color: var(--steel);
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-back:hover { border-color: var(--ink); color: var(--ink); }

    .email-prompt { color: var(--steel); margin-bottom: 20px; font-size: 1rem; line-height: 1.55; }
    .email-input {
      width: 100%;
      padding: 14px 16px;
      font-family: var(--font-ui);
      font-size: 1.1rem;
      background: var(--surface);
      border: 1.5px solid var(--line-strong);
      border-radius: var(--r-sm);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .email-input::placeholder { color: var(--steel-soft); }
    .email-input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-ring); }
    .email-error { color: var(--danger); font-size: 0.9rem; margin-top: 10px; min-height: 1.2em; font-weight: 600; }

    .confirm-icon {
      font-size: 2rem;
      color: var(--ok);
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(31, 157, 87, 0.12);
      border-radius: 50%;
    }
    .confirm-msg { font-size: 1.1rem; color: var(--steel); line-height: 1.6; }

    @media print {
      body > * { display: none !important; }
      #contact-print-area { display: block !important; }
    }

    #contact-print-area {
      display: none;
      font-family: sans-serif;
      color: #000;
      padding: 40px;
    }
    #contact-print-area h1 { font-size: 1.6rem; margin-bottom: 4px; }
    #contact-print-area .print-sub { color: #555; font-size: 1rem; margin-bottom: 28px; }
    #contact-print-area .print-row { font-size: 1.1rem; margin-bottom: 12px; }
    #contact-print-area .print-row span { font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="JL Customs" class="header-logo">
  </header>

  <main>
    <!-- <p class="tagline">Custom Commercial Vehicles</p> -->
    <button class="estimate-btn" onclick="window.location.href='vehicle-select.html'">Get an Estimate</button>
    <button class="contact-btn" onclick="openContactModal()">Contact an Expert</button>
  </main>

  <div id="contact-print-area"></div>

  <div class="modal-overlay" id="contact-overlay">
    <div class="modal">

      <div class="modal-header">
        <h2 id="contact-modal-title">Contact an Expert</h2>
        <button class="modal-close" onclick="closeContactModal()">&times;</button>
      </div>

      <!-- Step: details -->
      <div id="contact-step-details">
        <div class="modal-body">
          <p class="email-prompt">Please enter your name and phone number to continue.</p>
          <input type="text" id="contact-name-input" class="email-input" placeholder="Your Name" autocomplete="off" style="margin-bottom: 12px;">
          <input type="tel" id="contact-phone-input" class="email-input" placeholder="Phone Number" autocomplete="off">
          <p class="email-error" id="contact-details-error"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-back" onclick="closeContactModal()">Cancel</button>
          <button class="btn-primary" onclick="submitContactDetails()">Continue</button>
        </div>
      </div>

      <div id="contact-step-info">
        <div class="modal-body">
          <p class="contact-intro">Speak directly with one of our experts - we're happy to help.</p>
          <div class="contact-row">
            <span class="contact-icon">&#128222;</span>
            <div>
              <div class="contact-label">Phone</div>
              <div class="contact-value">(317) 417-6240</div>
            </div>
          </div>
          <div class="contact-row">
            <span class="contact-icon">&#9993;</span>
            <div>
              <div class="contact-label">Email</div>
              <div class="contact-value">justin@jl-customs.com</div>
            </div>
          </div>
        </div>
        <div class="modal-footer" style="flex-direction:column; gap:10px;">
          <div style="display:flex; gap:10px; width:100%;">
            <button class="btn-secondary" style="flex:1;" onclick="printContactInfo()">&#128438; Print</button>
            <button class="btn-secondary" style="flex:1;" onclick="showContactStep('email')">&#9993; Email Me</button>
          </div>
          <button class="btn-primary" style="width:100%;" onclick="startVideoCall()">Video Call an Expert</button>
        </div>
      </div>

      <!-- Step: email -->
      <div id="contact-step-email" style="display:none;">
        <div class="modal-body">
          <p class="email-prompt">Enter your email and we'll send you our contact information.</p>
          <input type="email" id="contact-email-input" class="email-input" placeholder="yourname@example.com" autocomplete="off">
          <p class="email-error" id="contact-email-error"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-back" onclick="showContactStep('info')">&#8592; Back</button>
          <button class="btn-primary" id="contact-btn-send" onclick="sendContactEmail()">Send</button>
        </div>
      </div>

      <!-- Step: confirm -->
      <div id="contact-step-confirm" style="display:none;">
        <div class="modal-body" style="text-align:center; padding: 40px 24px;">
          <div class="confirm-icon">&#10003;</div>
          <p class="confirm-msg" id="contact-confirm-msg"></p>
        </div>
        <div class="modal-footer" style="justify-content:center;">
          <button class="btn-primary" onclick="closeContactModal()" style="flex:none; padding:12px 40px;">Done</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const serverUrl = window.JLConfig.serverUrl;
    let currentContactLeadId = null;

    function openContactModal() {
      resetTimer();
      document.getElementById('contact-name-input').value = sessionStorage.getItem('kiosk_name') || '';
      document.getElementById('contact-phone-input').value = sessionStorage.getItem('kiosk_phone') || '';
      document.getElementById('contact-details-error').textContent = '';
      document.getElementById('contact-email-input').value = '';
      document.getElementById('contact-email-error').textContent = '';
      showContactStep('details');
      document.getElementById('contact-overlay').classList.add('open');
    }

    function closeContactModal() {
      document.getElementById('contact-overlay').classList.remove('open');
      currentContactLeadId = null;
      resetTimer();
    }

    function showContactStep(step) {
      document.getElementById('contact-step-details').style.display = step === 'details' ? '' : 'none';
      document.getElementById('contact-step-info').style.display    = step === 'info'    ? '' : 'none';
      document.getElementById('contact-step-email').style.display   = step === 'email'   ? '' : 'none';
      document.getElementById('contact-step-confirm').style.display = step === 'confirm' ? '' : 'none';
      const titles = { details: 'Contact an Expert', info: 'Contact an Expert', email: 'Send Contact Info', confirm: 'Info Sent' };
      document.getElementById('contact-modal-title').textContent = titles[step];
    }

    function submitContactDetails() {
      const name = document.getElementById('contact-name-input').value.trim();
      const phone = document.getElementById('contact-phone-input').value.trim();
      const errorEl = document.getElementById('contact-details-error');
      if (!name) { errorEl.textContent = 'Please enter your name.'; return; }
      if (!phone) { errorEl.textContent = 'Please enter your phone number.'; return; }
      errorEl.textContent = '';
      sessionStorage.setItem('kiosk_name', name);
      sessionStorage.setItem('kiosk_phone', phone);
      fetch(`${serverUrl}/api/leads`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, source: 'contact' }),
      })
        .then(r => r.json())
        .then(data => { if (data.lead) currentContactLeadId = data.lead.id; })
        .catch(() => {});
      showContactStep('info');
    }

    function printContactInfo() {
      const name = document.getElementById('contact-name-input').value.trim();
      const phone = document.getElementById('contact-phone-input').value.trim();
      const customerLine = (name || phone)
        ? `<div class="print-row">Customer: <span>${[name, phone].filter(Boolean).join(' • ')}</span></div>`
        : '';
      document.getElementById('contact-print-area').innerHTML = `
        <h1>JL Customs</h1>
        <div class="print-sub">Contact an Expert</div>
        ${customerLine}
        <div class="print-row">Phone: <span>(555) 123-4567</span></div>
        <div class="print-row">Email: <span>info@jlcustoms.com</span></div>
      `;
      closeContactModal();
      window.print();
    }

    async function sendContactEmail() {
      const email = document.getElementById('contact-email-input').value.trim();
      const errorEl = document.getElementById('contact-email-error');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        return;
      }

      const btn = document.getElementById('contact-btn-send');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      errorEl.textContent = '';

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);

      try {
        const res = await fetch(`${serverUrl}/api/send-contact`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            name: document.getElementById('contact-name-input').value.trim(),
            phone: document.getElementById('contact-phone-input').value.trim(),
          }),
          signal: controller.signal,
        });

        clearTimeout(timeout);

        if (res.ok) {
          if (currentContactLeadId) {
            fetch(`${serverUrl}/api/leads/${currentContactLeadId}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email }),
            }).catch(() => {});
          }
          document.getElementById('contact-confirm-msg').textContent =
            `Our contact information has been sent to ${email}.`;
          showContactStep('confirm');
        } else {
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || 'Failed to send. Please try again.';
        }
      } catch {
        clearTimeout(timeout);
        errorEl.textContent = 'Could not reach the server. Please try again.';
      }

      btn.disabled = false;
      btn.textContent = 'Send';
    }

    document.getElementById('contact-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeContactModal();
    });

    async function startVideoCall() {
      try {
        const res = await fetch(`${serverUrl}/api/notify-boss`, { method: 'POST' });
        window.appLog?.write(`notify-boss: ${res.status}`);
      } catch (err) {
        window.appLog?.write(`notify-boss error: ${err.message}`);
      }
      window.location.href = 'video-call.html';
    }
  </script>

  <script>
    const TIMEOUT_MS = 180 * 1000;
    let inactivityTimer;

    function goBack() {
      sessionStorage.removeItem('kiosk_name');
      sessionStorage.removeItem('kiosk_phone');
      window.location.href = 'index.html';
    }

    function resetTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(goBack, TIMEOUT_MS);
    }

    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'].forEach((ev) => {
      document.addEventListener(ev, resetTimer, { passive: true });
    });

    resetTimer();
  </script>

  <script src="keyboard.js"></script>
</body>
</html>
