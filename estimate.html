<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JL Customs - Estimate</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      height: 100%;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(150% 60% at 50% -20%, #ffffff 0%, rgba(255,255,255,0) 50%),
        linear-gradient(180deg, var(--paper) 0%, #eceae3 100%);
      color: var(--ink);
      font-family: var(--font-ui);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 32px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 0 var(--brand), var(--shadow-sm);
      flex-shrink: 0;
      z-index: 5;
    }

    #back-btn {
      background: none;
      border: 1.5px solid var(--line-strong);
      color: var(--steel);
      padding: 9px 18px;
      border-radius: var(--r-sm);
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    #back-btn:hover {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--surface-2);
    }

    header h1 {
      font-family: var(--font-display);
      font-stretch: 112%;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.005em;
    }

    /* ── Scrollable content ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 36px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 700px;
      margin: 0 auto;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: var(--r);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: background 0.15s var(--ease), border-color 0.15s var(--ease),
                  box-shadow 0.18s var(--ease), transform 0.1s var(--ease);
      user-select: none;
    }

    .option:hover {
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
    }
    .option:active { transform: scale(0.995); }

    /* selected row reads clearly without changing structure */
    .option:has(input:checked) {
      border-color: var(--brand);
      background: var(--brand-tint);
      box-shadow: 0 0 0 1px var(--brand) inset, var(--shadow);
    }

    .option input[type="checkbox"],
    .option input[type="radio"] {
      width: 22px;
      height: 22px;
      accent-color: var(--brand);
      cursor: pointer;
      flex-shrink: 0;
    }

    .option-label {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .option-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      font-variant-numeric: tabular-nums lining-nums;
    }

    .option-part-number {
      display: block;
      font-size: 0.78rem;
      color: var(--steel-soft);
      margin-top: 3px;
      letter-spacing: 0.02em;
    }

    .category-heading {
      font-family: var(--font-ui);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--brand);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 2px 8px;
      margin-bottom: 2px;
    }

    /* stamped tick + trailing rule */
    .category-heading::before {
      content: '';
      width: 14px;
      height: 3px;
      background: var(--brand);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .category-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .category-heading:first-child {
      padding-top: 4px;
    }

    /* ── Scrollbar ── */
    main::-webkit-scrollbar {
      width: 8px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: var(--line-strong);
      border-radius: var(--r-pill);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    main::-webkit-scrollbar-thumb:hover {
      background: var(--steel-soft);
      background-clip: padding-box;
    }

    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(6px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -2px 0 var(--brand), 0 -6px 18px -10px rgba(18,20,26,0.18);
      flex-shrink: 0;
    }

    .price-tracker .tracker-label {
      font-size: 0.72rem;
      color: var(--steel-soft);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .price-tracker .tracker-total {
      font-family: var(--font-display);
      font-stretch: 112%;
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums lining-nums;
    }

    .price-tracker .tracker-count {
      font-size: 0.85rem;
      color: var(--steel);
      margin-top: 4px;
    }

    #checkout-btn {
      padding: 17px 46px;
      font-family: var(--font-display);
      font-stretch: 108%;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      background: linear-gradient(180deg, var(--brand) 0%, var(--brand-strong) 100%);
      color: #fff;
      border: none;
      border-radius: var(--r);
      cursor: pointer;
      box-shadow: var(--shadow-brand);
      transition: filter 0.2s, transform 0.12s, box-shadow 0.2s;
    }

    #checkout-btn:hover { filter: brightness(1.06); box-shadow: var(--shadow-brand), var(--shadow); }
    #checkout-btn:active { transform: scale(0.97); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14, 16, 20, 0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      width: min(520px, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .modal-overlay.open .modal { animation: modal-pop 0.28s var(--ease) both; }
    @keyframes modal-pop {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .modal-header {
      padding: 18px 24px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
      box-shadow: inset 0 -2px 0 var(--brand);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-family: var(--font-display);
      font-stretch: 110%;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.005em;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--steel-soft);
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      width: 36px;
      height: 36px;
      border-radius: var(--r-sm);
      transition: background 0.18s, color 0.18s;
    }

    .modal-close:hover { color: var(--ink); background: rgba(0,0,0,0.05); }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .modal-empty {
      color: var(--steel-soft);
      text-align: center;
      padding: 28px 0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
      font-size: 1rem;
    }
    .summary-row span:last-child { font-weight: 700; font-variant-numeric: tabular-nums lining-nums; white-space: nowrap; }

    .summary-row:last-child { border-bottom: none; }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-grand-total {
      font-family: var(--font-display);
      font-stretch: 110%;
      font-size: 1.4rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums lining-nums;
    }

    .btn-primary {
      padding: 13px 32px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(180deg, var(--brand) 0%, var(--brand-strong) 100%);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      box-shadow: var(--shadow-brand);
      transition: filter 0.2s, transform 0.12s, box-shadow 0.2s;
    }

    .btn-primary:hover { filter: brightness(1.06); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--line-strong); color: #fff; cursor: not-allowed; box-shadow: none; filter: none; }

    .btn-back {
      padding: 13px 24px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      background: none;
      border: 1.5px solid var(--line-strong);
      color: var(--steel);
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-back:hover { border-color: var(--ink); color: var(--ink); }

    .email-prompt {
      color: var(--steel);
      margin-bottom: 20px;
      font-size: 1rem;
      line-height: 1.55;
    }

    .email-input {
      width: 100%;
      padding: 14px 16px;
      font-family: var(--font-ui);
      font-size: 1.1rem;
      background: var(--surface);
      border: 1.5px solid var(--line-strong);
      border-radius: var(--r-sm);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .email-input::placeholder { color: var(--steel-soft); }
    .email-input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-ring); }

    .email-error {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
      font-weight: 600;
    }

    .confirm-icon {
      font-size: 2rem;
      color: var(--ok);
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(31, 157, 87, 0.12);
      border-radius: 50%;
    }

    .confirm-msg {
      font-size: 1.1rem;
      color: var(--steel);
      line-height: 1.6;
    }

    @media print {
      body > * { display: none !important; }
      #print-area { display: block !important; }
    }

    #print-area {
      display: none;
      font-family: sans-serif;
      color: #000;
      padding: 40px;
    }

    #print-area h1 { font-size: 1.6rem; margin-bottom: 8px; }
    #print-area .print-date { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
    #print-area table { width: 100%; border-collapse: collapse; }
    #print-area th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #000; }
    #print-area td { padding: 8px 12px; border-bottom: 1px solid #ccc; }
    #print-area td:last-child, #print-area th:last-child { text-align: right; }
    #print-area .print-total { font-weight: bold; font-size: 1.1rem; }
    #print-area .print-sub { color: #555; font-size: 1rem; margin-bottom: 12px; }
  </style>
</head>
<body>

  <header>
    <button id="back-btn">&#8592; Back</button>
    <h1>Build Your Estimate</h1>
  </header>

  <main>
    <div class="options-list" id="options-list"></div>
  </main>

  <footer>
    <div class="price-tracker">
      <div class="tracker-label">Estimated Total</div>
      <div class="tracker-total" id="tracker-total">$0</div>
      <div class="tracker-count" id="tracker-count">0 items selected</div>
    </div>
    <button id="checkout-btn">Review Estimate</button>
  </footer>

  <div id="print-area"></div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Your Estimate</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>

      <div id="step-details">
        <div class="modal-body">
          <p class="email-prompt">Please enter your name and phone number to continue.</p>
          <input type="text" id="name-input" class="email-input" placeholder="Your Name" autocomplete="off" style="margin-bottom: 12px;">
          <input type="tel" id="phone-input" class="email-input" placeholder="Phone Number" autocomplete="off">
          <p class="email-error" id="details-error"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-back" id="btn-cancel-details">Cancel</button>
          <button class="btn-primary" id="btn-continue-details">Continue</button>
        </div>
      </div>

      <div id="step-review">
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" style="flex-direction:column; gap:12px; align-items:stretch;">
          <span class="modal-grand-total" id="modal-grand-total" style="text-align:center;"></span>
          <div style="display:flex; gap:12px;">
            <button class="btn-back" id="btn-print" style="flex:1; text-align:center;">&#128438; Print</button>
            <button class="btn-primary" id="btn-continue" style="flex:1;">&#9993; Email</button>
          </div>
        </div>
      </div>

      <div id="step-email" style="display:none;">
        <div class="modal-body">
          <p class="email-prompt">Enter your email address and we'll send your estimate.</p>
          <input type="email" id="email-input" class="email-input" placeholder="yourname@example.com" autocomplete="off">
          <p class="email-error" id="email-error"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-back" id="btn-back-step">&#8592; Back</button>
          <button class="btn-primary" id="btn-send">Send Estimate</button>
        </div>
      </div>

      <div id="step-confirm" style="display:none;">
        <div class="modal-body" style="text-align:center; padding: 40px 24px;">
          <div class="confirm-icon">&#10003;</div>
          <p class="confirm-msg" id="confirm-msg"></p>
        </div>
        <div class="modal-footer" style="justify-content:center;">
          <button class="btn-primary" id="btn-done">Done</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const serverUrl = window.JLConfig.serverUrl;
    let currentEstimateLeadId = null;
    const company = new URLSearchParams(window.location.search).get('company') || 'Company_1';

    const fmt = (n) => '$' + n.toLocaleString('en-US');

    // secondary item wrappers: label → element
    const secondaryElements = new Map();

    function buildOptions(data) {
      const list = document.getElementById('options-list');
      list.innerHTML = '';
      secondaryElements.clear();

      const isHierarchical = data.length > 0 && data[0].category !== undefined;

      if (isHierarchical) {
        data.forEach((cat, catIdx) => {
          const isPrimary = catIdx === 0;

          const section = document.createElement('div');
          section.className = 'category-section';
          if (!isPrimary) {
            section.classList.add('secondary-section');
            section.style.display = 'none';
          }

          const heading = document.createElement('div');
          heading.className = 'category-heading';
          heading.textContent = cat.category;
          section.appendChild(heading);

          const isSingle = (cat.type || 'multiple') === 'single';
          cat.items.forEach((item, i) => {
            const idx = catIdx * 1000 + i;
            let el;
            if (isPrimary && isSingle) {
              el = createPrimaryElement(item, idx, 'primary-choice');
            } else if (isSingle) {
              el = createSecondaryElement(item, idx, 'radio', `cat-single-${catIdx}`);
            } else {
              el = createSecondaryElement(item, idx, 'checkbox', null);
            }
            section.appendChild(el);
          });

          list.appendChild(section);
        });
      } else {
        // flat data — all checkboxes, no primary gating
        data.forEach((item, i) => list.appendChild(createSecondaryElement(item, i)));
      }
    }

    function createPrimaryElement(item, idx, groupName = 'primary-choice') {
      const id = `primary-${idx}`;
      const wrapper = document.createElement('div');
      wrapper.className = 'option-wrapper';

      const label = document.createElement('label');
      label.className = 'option';
      label.htmlFor = id;
      label.innerHTML = `
        <input type="radio" name="${groupName}" id="${id}" data-price="${item.price}" data-label="${item.label}" data-part-number="${item.partNumber || ''}">
        <span class="option-label">
          ${item.label}
          ${item.partNumber ? `<span class="option-part-number">Part #: ${item.partNumber}</span>` : ''}
        </span>
        <span class="option-price">${fmt(item.price)}</span>
      `;
      label.querySelector('input').addEventListener('change', () => {
        updateVisibility();
      });

      wrapper.appendChild(label);
      return wrapper;
    }

    function createSecondaryElement(item, idx, inputType = 'checkbox', groupName = null) {
      const id = `opt-${idx}`;
      const requires = Array.isArray(item.requires) ? item.requires
        : (item.requires ? item.requires.split('|').map(r => r.trim()) : []);

      const wrapper = document.createElement('div');
      wrapper.className = 'option-wrapper';
      wrapper.dataset.requires = JSON.stringify(requires);
      wrapper.style.display = 'none';

      const label = document.createElement('label');
      label.className = 'option';
      label.htmlFor = id;
      const nameAttr = groupName ? `name="${groupName}"` : '';
      label.innerHTML = `
        <input type="${inputType}" ${nameAttr} id="${id}" data-price="${item.price}" data-label="${item.label}" data-part-number="${item.partNumber || ''}">
        <span class="option-label">
          ${item.label}
          ${item.partNumber ? `<span class="option-part-number">Part #: ${item.partNumber}</span>` : ''}
        </span>
        <span class="option-price">${fmt(item.price)}</span>
      `;
      label.addEventListener('change', updateTotal);

      wrapper.appendChild(label);
      secondaryElements.set(item.label, wrapper);
      return wrapper;
    }

    function getSelectedPrimary() {
      return document.querySelector('input[name="primary-choice"]:checked') || null;
    }

    function updateVisibility() {
      const hasPrimaryGating = document.querySelector('input[name="primary-choice"]') !== null;
      const radio = getSelectedPrimary();
      const selectedLabel = radio ? radio.dataset.label : null;

      // Show/hide entire secondary sections
      document.querySelectorAll('.secondary-section').forEach(section => {
        section.style.display = (!hasPrimaryGating || selectedLabel) ? '' : 'none';
      });

      // Show/hide individual secondary items
      secondaryElements.forEach((wrapper, itemLabel) => {
        const requires = JSON.parse(wrapper.dataset.requires || '[]');
        const visible = !hasPrimaryGating
          ? true
          : (selectedLabel && (requires.length === 0 || requires.includes(selectedLabel)));

        if (!visible) {
          const input = wrapper.querySelector('input');
          if (input) input.checked = false;
          wrapper.style.display = 'none';
        } else {
          wrapper.style.display = '';
        }
      });

      updateTotal();
    }

    async function loadOptions() {
      const cacheKey = `cachedEstimateOptions_${company}`;
      let data = null;

      try {
        const res = await fetch(`${serverUrl}/api/estimate-options/${encodeURIComponent(company)}`);
        if (res.ok) {
          const fetched = await res.json();
          if (Array.isArray(fetched) && fetched.length > 0) {
            data = fetched;
            localStorage.setItem(cacheKey, JSON.stringify(data));
          }
        }
      } catch { /* fall through to cache */ }

      if (!data) {
        try {
          const cached = localStorage.getItem(cacheKey);
          if (cached) data = JSON.parse(cached);
        } catch { /* ignore */ }
      }

      if (data && data.length > 0) {
        buildOptions(data);
        updateVisibility();
      } else {
        document.getElementById('options-list').innerHTML =
          '<p style="color:var(--steel);text-align:center;padding:48px 0;font-size:1.05rem;line-height:1.6;">No build options are available for this vehicle yet.<br>Head back and contact an expert — we’ll help you spec it out.</p>';
      }
    }

    loadOptions();

    function getChecked() {
      const results = [];
      results.push(...document.querySelectorAll('input[type="radio"]:checked'));
      results.push(...document.querySelectorAll('input[type="checkbox"]:checked'));
      return results;
    }

    function updateTotal() {
      const checked = getChecked();
      const total = checked.reduce((sum, cb) => sum + Number(cb.dataset.price), 0);
      document.getElementById('tracker-total').textContent = fmt(total);
      const n = checked.length;
      document.getElementById('tracker-count').textContent = `${n} item${n !== 1 ? 's' : ''} selected`;
    }

    // ── Modal steps ────────────────────────────────────────────
    function showStep(step) {
      document.getElementById('step-details').style.display = step === 'details' ? '' : 'none';
      document.getElementById('step-review').style.display  = step === 'review'  ? '' : 'none';
      document.getElementById('step-email').style.display   = step === 'email'   ? '' : 'none';
      document.getElementById('step-confirm').style.display = step === 'confirm' ? '' : 'none';
      const titles = { details: 'Your Estimate', review: 'Your Estimate', email: 'Send Your Estimate', confirm: 'Estimate Sent' };
      document.getElementById('modal-title').textContent = titles[step];
    }

    function openModal() {
      const checked = getChecked();
      const total = checked.reduce((sum, cb) => sum + Number(cb.dataset.price), 0);

      if (checked.length === 0) {
        document.getElementById('modal-body').innerHTML = '<p class="modal-empty">No items selected yet.</p>';
      } else {
        document.getElementById('modal-body').innerHTML = checked.map((cb) => {
          const label = cb.dataset.label || '';
          const partNumber = cb.dataset.partNumber;
          const partTag = partNumber ? `<span style="font-size:0.8rem;color:#888;display:block;margin-top:2px;">Part #: ${partNumber}</span>` : '';
          return `<div class="summary-row"><span>${label}${partTag}</span><span>${fmt(Number(cb.dataset.price))}</span></div>`;
        }).join('');
      }

      document.getElementById('modal-grand-total').textContent = `Total: ${fmt(total)}`;
      document.getElementById('name-input').value = sessionStorage.getItem('kiosk_name') || '';
      document.getElementById('phone-input').value = sessionStorage.getItem('kiosk_phone') || '';
      document.getElementById('details-error').textContent = '';
      document.getElementById('email-input').value = '';
      document.getElementById('email-error').textContent = '';
      showStep('details');
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      currentEstimateLeadId = null;
    }

    document.getElementById('checkout-btn').addEventListener('click', openModal);
    document.getElementById('modal-close').addEventListener('click', closeModal);

    document.getElementById('btn-cancel-details').addEventListener('click', closeModal);
    document.getElementById('btn-continue-details').addEventListener('click', () => {
      const name = document.getElementById('name-input').value.trim();
      const phone = document.getElementById('phone-input').value.trim();
      const errorEl = document.getElementById('details-error');
      if (!name) { errorEl.textContent = 'Please enter your name.'; return; }
      if (!phone) { errorEl.textContent = 'Please enter your phone number.'; return; }
      errorEl.textContent = '';
      sessionStorage.setItem('kiosk_name', name);
      sessionStorage.setItem('kiosk_phone', phone);
      fetch(`${serverUrl}/api/leads`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, source: 'estimate' }),
      })
        .then(r => r.json())
        .then(data => { if (data.lead) currentEstimateLeadId = data.lead.id; })
        .catch(() => {});
      showStep('review');
    });
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.getElementById('btn-continue').addEventListener('click', () => showStep('email'));

    document.getElementById('btn-print').addEventListener('click', () => {
      const checked = getChecked();
      const total = checked.reduce((sum, cb) => sum + Number(cb.dataset.price), 0);
      const rows = checked.map((cb) => {
        const label = cb.dataset.label || '';
        const partNumber = cb.dataset.partNumber || '';
        return `<tr><td>${label}</td><td>${partNumber}</td><td>$${Number(cb.dataset.price).toLocaleString('en-US')}</td></tr>`;
      }).join('');

      const name = document.getElementById('name-input').value.trim();
      const phone = document.getElementById('phone-input').value.trim();
      const customerLine = (name || phone)
        ? `<div class="print-sub">${[name, phone].filter(Boolean).join(' • ')}</div>`
        : '';
      document.getElementById('print-area').innerHTML = `
        <h1>JL Customs — Estimate</h1>
        <div class="print-date">${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
        ${customerLine}
        <table>
          <thead><tr><th>Item</th><th>Part #</th><th>Price</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="3">No items selected</td></tr>'}</tbody>
          <tfoot><tr><td class="print-total" colspan="2">Estimated Total</td><td class="print-total">$${total.toLocaleString('en-US')}</td></tr></tfoot>
        </table>
      `;
      closeModal();
      window.print();
    });
    document.getElementById('btn-back-step').addEventListener('click', () => showStep('review'));
    document.getElementById('btn-done').addEventListener('click', closeModal);

    document.getElementById('btn-send').addEventListener('click', async () => {
      const email = document.getElementById('email-input').value.trim();
      const errorEl = document.getElementById('email-error');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        return;
      }

      const btn = document.getElementById('btn-send');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      errorEl.textContent = '';

      const checked = getChecked();
      const items = checked.map((cb) => ({
        label: cb.dataset.label || '',
        price: Number(cb.dataset.price),
        partNumber: cb.dataset.partNumber || '',
      }));
      const total = items.reduce((sum, i) => sum + i.price, 0);

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);

      try {
        const res = await fetch(`${serverUrl}/api/send-estimate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            items,
            total,
            name: document.getElementById('name-input').value.trim(),
            phone: document.getElementById('phone-input').value.trim(),
          }),
          signal: controller.signal,
        });

        clearTimeout(timeout);

        if (res.ok) {
          if (currentEstimateLeadId) {
            fetch(`${serverUrl}/api/leads/${currentEstimateLeadId}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, items, total }),
            }).catch(() => {});
          }
          document.getElementById('confirm-msg').textContent =
            `Your estimate has been sent to ${email}. Thank you!`;
          showStep('confirm');
        } else {
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || 'Failed to send. Please try again.';
        }
      } catch {
        clearTimeout(timeout);
        errorEl.textContent = 'Could not reach the server. Please try again.';
      }

      btn.disabled = false;
      btn.textContent = 'Send Estimate';
    });

    // Navigation
    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = 'home.html';
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const overlay = document.getElementById('modal-overlay');
        if (overlay.classList.contains('open')) closeModal();
        else window.location.href = 'home.html';
      }
    });

    const TIMEOUT_MS = 60 * 1000 * 3;
    let inactivityTimer;

    function resetTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        sessionStorage.removeItem('kiosk_name');
        sessionStorage.removeItem('kiosk_phone');
        window.location.href = 'index.html';
      }, TIMEOUT_MS);
    }

    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'].forEach((ev) => {
      document.addEventListener(ev, resetTimer, { passive: true });
    });

    resetTimer();
  </script>
</body>
</html>
